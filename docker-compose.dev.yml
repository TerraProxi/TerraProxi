# Compose pour développement local — expose les ports pour faciliter le debug
services:
  db:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: terraproxi
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./infrastructure/database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d terraproxi"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata_dev:
