services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - back
      - front
    networks:
      - public
      - internal

  front:
    image: ${FRONT_IMAGE:-terraproxi-front:latest}
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - internal

  back:
    image: ${BACK_IMAGE:-terraproxi-back:latest}
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3002"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: 3002
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  db:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # La DB n'est jamais exposée sur Internet — réseau interne uniquement
    networks:
      - internal

networks:
  public: {}
  internal:
    internal: true

volumes:
  pgdata:
  caddy_data:
  caddy_config:
